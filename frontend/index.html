<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birthday Reminder</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>🎂 Birthday Reminder</h1>
        
        <!-- Add Birthday Form -->
        <div class="form-container">
            <h2>Add New Birthday</h2>
            <form id="birthdayForm">
                <input type="text" id="name" placeholder="Enter name" required>
                <input type="date" id="birthdate" required>
                <button type="submit">Add Birthday</button>
            </form>
        </div>

        <!-- Upcoming Birthdays Reminder Section -->
        <div class="reminder-section" id="reminderSection">
            <h2>🎈 Upcoming Birthdays</h2>
            <div id="reminderList">Loading...</div>
        </div>

        <!-- Birthday List -->
        <div class="birthday-list">
            <h2>📅 All Birthdays</h2>
            <div id="birthdayContainer"></div>
        </div>
    </div>

    <!-- Edit Modal -->
    <div id="editModal" class="modal">
        <div class="modal-content">
            <h2>Edit Birthday</h2>
            <form id="editForm">
                <input type="hidden" id="editId">
                <input type="text" id="editName" placeholder="Name" required>
                <input type="date" id="editBirthdate" required>
                <button type="submit">Update</button>
                <button type="button" onclick="closeModal()">Cancel</button>
            </form>
        </div>
    </div>

    <div class="footer">
        <p>Bangaluru Karnataka Mar 20, 2026</p>
    </div>

    <script src="script.js"></script>
</body>
</html>
